service: notebooklm-backend

# 配置 AWS 提供商参数
provider:
  name: aws
  runtime: python3.12
  region: ${env:AWS_REGION, 'ap-northeast-1'}
  stage: ${opt:stage, 'dev'}
  timeout: 29
  apiGateway:
    binaryMediaTypes:
      - '*/*'
  iam:
    role:
      statements:
        - Effect: "Allow"
          Action:
            - "s3:*"
            - "dynamodb:*"
            - "bedrock:*"
          Resource: "*"
  environment:
    # 通过从宿主机注入环境变量来支持双轨制
    MODELSCOPE_API_KEY: ${env:MODELSCOPE_API_KEY}
    AWS_S3_BUCKET_NAME: ${env:AWS_S3_BUCKET_NAME}
    PINECONE_API_KEY: ${env:PINECONE_API_KEY}
    PINECONE_INDEX: ${env:PINECONE_INDEX}
    LLM_PROVIDER: ${env:LLM_PROVIDER, 'modelscope'}
    EMBED_PROVIDER: ${env:EMBED_PROVIDER, 'modelscope'}
    VECTOR_DB_PROVIDER: ${env:VECTOR_DB_PROVIDER, 'pinecone'}
    RETRIEVER_MODE: ${env:RETRIEVER_MODE, 'MANUAL'}
    KNOWLEDGE_BASE_ID: ${env:KNOWLEDGE_BASE_ID, ''}
    DATA_SOURCE_ID: ${env:DATA_SOURCE_ID, ''}

functions:
  api:
    # 指向 app.py 里的 handler (Mangum 包裹实例)
    handler: app.handler
    url:
      authorizer: none # 必须显式允许公开访问，否则会报 403
      cors: true       # 开启跨域
    events:
      - httpApi:
          path: '/{proxy+}'
          method: '*'

plugins:
  - serverless-python-requirements

custom:
  pythonRequirements:
    dockerizePip: non-linux
    zip: true
    slim: true
